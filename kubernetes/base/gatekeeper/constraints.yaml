# kubernetes/base/gatekeeper/constraints.yaml
# Binds each ConstraintTemplate to the todo-app namespace.
# enforcementAction: deny  → hard block at admission time
# enforcementAction: dryrun → audit only (safe to test with first)

apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredResourceLimits
metadata:
  name: require-resource-limits-todo
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces:
      - todo-app
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sNoLatestTag
metadata:
  name: no-latest-tag-todo
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces:
      - todo-app
