apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: django-ingress
  namespace: todo-app
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  defaultBackend:              # ← use defaultBackend instead of rules
    service:
      name: django-service
      port:
        number: 8000
